version: "3.9"

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        VITE_SOLANA_RPC_URL: ${VITE_SOLANA_RPC_URL:-https://api.devnet.solana.com}
        VITE_PROGRAM_ID: ${VITE_PROGRAM_ID:-Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkgMQhgwdnB6m}
        VITE_TREASURY_WALLET: ${VITE_TREASURY_WALLET:-REPLACE_WITH_DEVNET_TREASURY}
        VITE_NETWORK: ${VITE_NETWORK:-devnet}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    ports:
      - "8080:80"
    environment:
      - VITE_SOLANA_RPC_URL
      - VITE_PROGRAM_ID
      - VITE_TREASURY_WALLET
      - VITE_NETWORK
      - VITE_BASE_PATH
    restart: unless-stopped
